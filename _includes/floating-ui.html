{% comment %}
  Floating Nav (Assistive Touch): draggable main button that expands to show
  context-aware navigation + utility buttons. Replaces old floating buttons.
  Parameters: include.show_share (boolean)
{% endcomment %}

<!-- Floating Nav - Assistive Touch -->
<div id="floating-nav" class="floating-nav" role="navigation" aria-label="Điều hướng nhanh">
  <!-- Main toggle button (draggable) -->
  <button id="floating-nav-toggle" class="floating-nav__toggle" aria-label="Menu điều hướng" aria-expanded="false">
    <span class="material-icons-outlined floating-nav__icon-menu">explore</span>
    <span class="material-icons-outlined floating-nav__icon-close">close</span>
  </button>

  <!-- Expandable menu items (fan upward) -->
  <div class="floating-nav__menu" id="floating-nav-menu">
    <!-- Back to Top -->
    <button class="floating-nav__item" id="fn-back-top" aria-label="Quay lên đầu trang" data-tooltip="Lên đầu">
      <span class="material-icons-outlined">vertical_align_top</span>
    </button>

    <!-- Settings -->
    <button class="floating-nav__item" id="fn-settings" aria-label="Cài đặt giao diện" data-tooltip="Giao diện">
      <span class="material-icons-outlined">text_fields</span>
    </button>

    {% if include.show_share %}
    <!-- Share / Deep-link -->
    <button class="floating-nav__item" id="fn-share" aria-label="Chia sẻ link" data-tooltip="Chia sẻ">
      <span class="material-icons-outlined">link</span>
    </button>
    {% endif %}

    <!-- Back to Book (L2 only) -->
    <a class="floating-nav__item floating-nav__item--nav" id="fn-book" aria-label="Về trang sách" data-tooltip="Trang sách" href="#">
      <span class="material-icons-outlined">menu_book</span>
    </a>

    <!-- Home / Library -->
    <a class="floating-nav__item floating-nav__item--nav" id="fn-home" aria-label="Thư viện" data-tooltip="Thư viện" href="{{ '/' | relative_url }}">
      <span class="material-icons-outlined">home</span>
    </a>
  </div>
</div>

<!-- Settings panel -->
<div id="settings-panel" class="settings-panel" role="dialog" aria-label="Giao diện đọc">
  <h3>Giao diện đọc</h3>

  <!-- Font size -->
  <div class="font-size-controls">
    <button id="font-decrease" aria-label="Giảm cỡ chữ" style="font-size:14px">A</button>
    <div class="font-size-bar">
      <div class="font-size-bar-fill" id="font-bar-fill"></div>
    </div>
    <span class="font-size-label" id="font-size-label">18px</span>
    <button id="font-increase" aria-label="Tăng cỡ chữ" style="font-size:20px">A</button>
  </div>

  <div class="settings-divider"></div>

  <!-- Theme grid -->
  <div class="theme-grid">
    <button class="theme-card" data-theme="original">
      <div class="theme-card-swatch"></div>
      Original
    </button>
    <button class="theme-card" data-theme="quiet">
      <div class="theme-card-swatch"></div>
      Quiet
    </button>
    <button class="theme-card" data-theme="paper">
      <div class="theme-card-swatch"></div>
      Paper
    </button>
    <button class="theme-card" data-theme="bold">
      <div class="theme-card-swatch"></div>
      Bold
    </button>
    <button class="theme-card" data-theme="calm">
      <div class="theme-card-swatch"></div>
      Calm
    </button>
    <button class="theme-card" data-theme="focus">
      <div class="theme-card-swatch"></div>
      Focus
    </button>
    <button class="theme-card" data-theme="dark">
      <div class="theme-card-swatch"></div>
      Dark
    </button>
  </div>
</div>

<!-- Share toast -->
<div id="share-toast" class="share-toast" aria-live="polite"></div>

<!-- Mobile overlay -->
<div id="settings-overlay" class="settings-overlay"></div>
