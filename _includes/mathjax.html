<script>
MathJax = {
  tex: {
    macros: {
      {% assign book_key = page.book_key %}
      {% if book_key %}
        {% assign macros = site.data[book_key].mathjax.macros %}
        {% if macros %}
          {% for m in macros %}
            {{ m[0] | jsonify }}: {{ m[1] | jsonify }}{% unless forloop.last %},{% endunless %}
          {% endfor %}
        {% endif %}
      {% endif %}
    },
    tags: 'ams'
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
