<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - HP Library{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:locale" content="vi_VN">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/css/tokens.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/library.css' | relative_url }}">
</head>
<body data-page-level="library">

  <nav class="lib-navbar">
    <div class="lib-navbar__inner">
      <a href="{{ '/' | relative_url }}" class="lib-navbar__brand">
        <span class="material-icons-outlined">local_library</span>
        HP Library
      </a>
      <ul class="lib-navbar__links">
        <li><a href="{{ '/' | relative_url }}">Thư viện</a></li>
        <li><a href="{{ '/' | relative_url }}#books">Tiến độ</a></li>
      </ul>
      <button class="lib-navbar__hamburger material-icons-outlined" aria-label="Menu">menu</button>
    </div>
  </nav>

  {{ content }}

  <footer class="lib-footer">
    <span class="lib-footer__brand">HP Library</span> &mdash; Hoang Phi, Nghiên cứu sinh, Đại học Debrecen
  </footer>

  <script src="{{ '/js/library.js' | relative_url }}"></script>
</body>
</html>
